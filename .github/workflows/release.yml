name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Chrome Extension
        run: |
          cd extension
          jq --arg ver "${{ steps.version.outputs.VERSION }}" '.version = $ver' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          zip -r ../cf-police-chrome.zip ./*

      - name: Build Firefox Extension
        run: |
          cd extension
          jq --arg ver "${{ steps.version.outputs.VERSION }}" '.version = $ver' manifest.firefox.json > manifest.tmp && mv manifest.tmp manifest.firefox.json
          cp manifest.firefox.json manifest.json
          zip -r ../cf-police-firefox.zip ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cf-police-chrome.zip
            cf-police-firefox.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
